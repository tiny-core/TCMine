name: Publicar imagem do servidor (Docker Hub)

# Constrói e publica a imagem AUTOSSUFICIENTE do TCMine-Server no Docker Hub.
# Dispara em tags v* (ex.: v1.2.0) e manualmente. UMA versão para tudo: a mesma tag define a versão do
# servidor E do launcher (o servidor compila o launcher nessa versão, com o IP/AzureId das settings).
#
# Pré-requisitos — no repositório (Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME  → utilizador do Docker Hub
#   DOCKERHUB_TOKEN     → Access Token do Docker Hub (Read & Write)
# A imagem fica em:  docker.io/<DOCKERHUB_USERNAME>/tcmine-server

on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Versão (sem o 'v' da tag)
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Metadados (tags da imagem)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/tcmine-server
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: TCMine-Server/Dockerfile
          push: true
          # A versão vira o assembly do server (o server lê a própria versão para o self-update e para
          # compilar o launcher na mesma versão).
          build-args: |
            SERVER_VERSION=${{ steps.ver.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
