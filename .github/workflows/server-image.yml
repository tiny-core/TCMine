name: Publicar imagem do servidor (Docker Hub)

# Constrói e publica a imagem do TCMine-Server no Docker Hub. Dispara em tags server-v* (ex.: server-v1.2.0)
# e manualmente. DUAS faixas independentes:
#   - server-v*   → esta workflow (a imagem do servidor).
#   - launcher-v* → NÃO dispara build: é só a versão do código do launcher; o servidor em execução baixa a
#                   fonte dessa tag e recompila o launcher (sem tocar na imagem/container).
#
# Pré-requisitos — no repositório (Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME  → utilizador do Docker Hub
#   DOCKERHUB_TOKEN     → Access Token do Docker Hub (Read & Write)
# A imagem fica em:  docker.io/<DOCKERHUB_USERNAME>/tcmine-server

on:
  push:
    tags: [ "server-v*" ]
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Versão (sem o prefixo 'server-v')
        id: ver
        run: echo "version=${GITHUB_REF_NAME#server-v}" >> "$GITHUB_OUTPUT"

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: TCMine-Server/Dockerfile
          push: true
          # A versão vira o assembly do server (usada no self-update: server-v* vs versão corrente).
          build-args: |
            SERVER_VERSION=${{ steps.ver.outputs.version }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tcmine-server:${{ steps.ver.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/tcmine-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
