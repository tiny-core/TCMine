name: CI (build + testes)

# Compila a solução inteira e roda os testes a cada push/PR na master. Barreira barata contra
# regressões: se o build quebra ou um teste do core falha, o PR fica vermelho antes do merge.
# Não publica nada — a imagem do servidor continua na sua própria workflow (server-image.yml).

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # Restore separado para aproveitar o cache de NuGet do setup-dotnet entre execuções
      - name: Restore
        run: dotnet restore TCMine.slnx

      - name: Build
        run: dotnet build TCMine.slnx -c Release --no-restore

      - name: Test
        run: dotnet test TCMine-Tests/TCMine-Tests.csproj -c Release --no-build --verbosity normal
